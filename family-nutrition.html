            <Sec color="#FF8A65">Ключевые различия</Sec>
            {[
              {color:C.anvar,name:"⚡ Анвар",text:"Инженерная модель: ест только при актуальной потребности. Монопитание — норма. Красное мясо и красная рыба. Строгое разделение сырого/приготовлённого и Б/У. Обоняние — стражник."},
              {color:C.rita,name:"🌸 Рита",text:"Раздельное питание: мясо строго без углеводов (с овощами ✓, морепродукты+углеводы ✓). Не пить во время еды. Сырое и приготовлённое не смешивать. Есть с удовольствием — обязательно."},
              {color:C.akim,name:"🌱 Аким",text:"Конвейер + самостоятельность: сам решает что и сколько. Свежесть — главный критерий. Белки без углеводов. Углеводы как будто не нужны. Козье/растительное молоко ✓, коровье ✗."},
            ].map(it=>(
              <div key={it.name} style={{marginBottom:10,paddingLeft:10,borderLeft:`2px solid ${it.color}44`}}>
                <span style={{color:it.color,fontWeight:700,fontSize:13}}>{it.name}</span>
                <div style={{fontSize:12,color:"#BBB",marginTop:3,lineHeight:1.6}}>{it.text}</div>
              </div>
            ))}
          </Card>

          <Card>
            <Sec color="#80CBC4">Ритм дня</Sec>
            {[
              {time:"08:00",label:"Завтрак Риты",note:""},
              {time:"~11:00",label:"Завтрак Анвара",note:""},
              {time:"По потребности",label:"Аким — по желанию и свежести",note:""},
              {time:"13–15:00",label:"Обед — каждый отдельно",note:"будни: школа / работа"},
              {time:"18–19:00",label:"Ужин — совместный",note:""},
              {time:"Сб–Вс",label:"Обед + ужин совместные",note:"выходные"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8,fontSize:13}}>
                <div style={{width:100,color:"#666",fontSize:12,flexShrink:0}}>{r.time}</div>
                <div style={{flex:1}}>{r.label}{r.note&&<span style={{color:"#555",fontSize:11}}> · {r.note}</span>}</div>
              </div>
            ))}
          </Card>
        </div>
      )}

      {/* PERSON TABS */}
      {["anvar","rita","akim"].includes(tab) && p && (
        <div>
          <Card style={{borderColor:p.color+"44"}}>
            <div style={{fontSize:18,fontWeight:800,color:p.color}}>{p.emoji} {p.name}</div>
            <div style={{color:"#555",fontSize:12,marginTop:2}}>{p.model}</div>
            <button onClick={()=>setShowSrc(s=>!s)} style={{fontSize:10,background:"transparent",color:"#555",border:`1px solid ${C.bd}`,borderRadius:4,padding:"2px 8px",cursor:"pointer",marginTop:8}}>
              {showSrc?"скрыть источники":"📌 показать источники"}
            </button>
          </Card>

          <Card>
            <Sec color={p.color}>Профиль питания</Sec>
            {p.profile.map(item=>(
              <div key={item.label} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <Tag type={item.type}>{item.type==="yes"?"✓":item.type==="no"?"✗":"~"} {item.label}</Tag>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#999",lineHeight:1.5}}>{item.note}</div>
                  {showSrc&&<div style={{fontSize:10,color:"#444",fontStyle:"italic",marginTop:2}}>📌 {item.src}</div>}
                </div>
              </div>
            ))}
          </Card>

          <Card>
            <Sec color={p.color}>Правила</Sec>
            {p.rules.map((r,i)=>(
              <div key={i} style={{marginBottom:8,paddingLeft:10,borderLeft:`2px solid ${p.color}44`}}>
                <div style={{fontSize:13,color:"#CCC"}}>{r.text}</div>
                {showSrc&&<div style={{fontSize:10,color:"#444",fontStyle:"italic",marginTop:2}}>📌 {r.src}</div>}
              </div>
            ))}
          </Card>

          {["breakfast","lunch","dinner"].map(meal=>(
            <Card key={meal}>
              <Sec color={p.color}>{{breakfast:"🌅 Варианты завтрака",lunch:"☀️ Варианты обеда",dinner:"🌙 Варианты ужина"}[meal]}</Sec>
              {p.meals[meal].map((item,i)=>(
                <div key={i} style={{fontSize:13,color:"#CCC",marginBottom:5,paddingLeft:8,borderLeft:`2px solid ${C.bd}`}}>{item}</div>
              ))}
            </Card>
          ))}

          {tab==="akim"&&p.meals.school&&(
            <Card style={{borderColor:C.akim+"44"}}>
              <Sec color={C.akim}>🎒 В школу (контейнер)</Sec>
              {p.meals.school.map((item,i)=>(
                <div key={i} style={{fontSize:13,color:item.startsWith("⚠")?"#FFA726":"#CCC",marginBottom:6,paddingLeft:8,borderLeft:`2px solid ${item.startsWith("⚠")?C.akim:C.bd}`,fontStyle:item.startsWith("⚠")?"italic":"normal"}}>{item}</div>
              ))}
            </Card>
          )}
        </div>
      )}

      {/* SHARED */}
      {tab==="shared"&&(
        <div>
          <Card style={{borderColor:"#FFB30044"}}>
            <Sec color="#FFB300">Когда общий стол</Sec>
            <div style={{fontSize:13,color:"#AAA",lineHeight:1.8}}>
              <b style={{color:"#FFA726"}}>Будни:</b> завтраки и обеды — каждый отдельно (школа/работа). Ужин — совместный.<br/>
              <b style={{color:"#FFA726"}}>Выходные:</b> обед + ужин — совместные.
            </div>
          </Card>

          <Card>
            <Sec color="#66BB6A">Правила совместного стола</Sec>
            {SHARED_RULES.map((r,i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{fontSize:13,color:"#DDD",fontWeight:600}}>{r.rule}</div>
                <div style={{fontSize:12,color:"#777",marginTop:2}}>{r.detail}</div>
                <div style={{fontSize:11,color:"#555",marginTop:1}}>→ {r.who}</div>
              </div>
            ))}
          </Card>

          <Card>
            <Sec color="#80CBC4">Совместные блюда (подходят всем)</Sec>
            {SHARED_DISHES.map((m,i)=>(
              <div key={i} style={{marginBottom:10,paddingLeft:8,borderLeft:`2px solid ${C.bd}`}}>
                <div style={{fontSize:13,color:"#DDD",fontWeight:600}}>{m.name}</div>
                <div style={{fontSize:12,color:"#666",marginTop:2}}>{m.note}</div>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
