                      {cafe.byPerson[person].avoid.length>0 && (
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:10,color:C.no,fontWeight:700,marginBottom:5}}>✗ ИЗБЕГАТЬ</div>
                          {cafe.byPerson[person].avoid.map((item,i)=>(
                            <div key={i} style={{fontSize:12,color:"#888",marginBottom:4,paddingLeft:8,borderLeft:"2px solid #C6282844"}}>{item}</div>
                          ))}
                        </div>
                      )}
                      {cafe.byPerson[person].ask.length>0 && (
                        <div>
                          <div style={{fontSize:10,color:C.ok,fontWeight:700,marginBottom:5}}>❓ УТОЧНИТЬ У ОФИЦИАНТА</div>
                          {cafe.byPerson[person].ask.map((item,i)=>(
                            <div key={i} style={{fontSize:12,color:"#CCC",marginBottom:4,paddingLeft:8,borderLeft:"2px solid #E6510044"}}>{item}</div>
                          ))}
                        </div>
                      )}
                    </>}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
